<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLARIS - Comando Central</title>
    <link href="./dist/output.css" rel="stylesheet">
</head>
<body class="container">
    <header>
        <h1>SISTEMA POLARIS</h1>
        <p>Módulo de Gestión de Tripulación</p>
    </header>

    <section class="form-container">
        <h2 style="color: white; margin-bottom: 1.5rem;">Registro de Personal</h2>
        <form id="formRegistro">
            <input type="hidden" id="miembroId">
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="nombre" required>
            </div>
            <div class="form-group">
                <label>Correo Electronico</label>
                <input type="email" id="correo" required>
            </div>
            <div class="form-group">
                <label>Rango (Rol)</label>
                <select id="rol" required>
                    <option value="">Seleccionar rango...</option>
                    <option value="Administrador">ADMINISTRADOR</option>
                    <option value="Desarrollador">DESARROLLADOR</option>
                    <option value="Diseñador">DISEÑADOR</option>
                </select>
            </div>
            <button type="submit" id="btnSubmit" class="btn-main">Registrar en Polaris</button>
        </form>
    </section>

    <section class="members-section">
        <h2 style="margin-bottom: 2rem; text-align: center;">Personal</h2>
        <div id="listaMiembros" class="grid-members">
            </div>
    </section>

    <script src="./src/app.js"></script>
</body>
</html>
