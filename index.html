<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLARIS - Comando Central</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="./dist/output.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), 
                        url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-attachment: fixed;
        }
        .flatpickr-calendar {
            background: #1e293b !important;
            border: 1px solid #334155 !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
        }
        .flatpickr-day {
            color: #e2e8f0 !important;
        }
        .flatpickr-day.selected {
            background: #3b82f6 !important;
            color: white !important;
        }
        .flatpickr-day:hover {
            background: #334155 !important;
        }
        .flatpickr-months .flatpickr-month, .flatpickr-current-month, .flatpickr-weekdays {
            color: white !important;
        }
        .flatpickr-weekday {
            color: #cbd5e1 !important;
        }
        .flatpickr-day.prevMonthDay, .flatpickr-day.nextMonthDay {
            color: #64748b !important;
        }
    </style>
</head>
<body class="text-white font-sans antialiased">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-bold tracking-tight text-white mb-2">SISTEMA POLARIS</h1>
            <p class="text-gray-400 text-lg">Módulo de Gestión de Tripulación y Eventos</p>
        </header>

        <div class="bg-black/70 backdrop-blur-md border border-white/10 rounded-xl p-8 mb-12 max-w-4xl mx-auto shadow-2xl">
            <h2 class="text-2xl font-bold text-white border-l-4 border-white pl-4 mb-6">Registro de Personal</h2>
            <form id="formRegistro" class="space-y-5">
                <input type="hidden" id="miembroId">

                <div class="border-b border-white/20 pb-4 mb-2">
                    <h3 class="text-lg font-semibold text-white mb-3">Datos Personales</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-1">Nombre(s)</label>
                            <input type="text" id="nombre" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                        </div>
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-1">Apellido Paterno</label>
                            <input type="text" id="apellidoPaterno" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                        </div>
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-1">Apellido Materno</label>
                            <input type="text" id="apellidoMaterno" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                        </div>
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-1">Correo Electrónico (Personal)</label>
                            <input type="email" id="correo" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                        </div>
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-1">Teléfono Móvil (10 dígitos)</label>
                            <input type="tel" id="telefono" pattern="\d{10}" maxlength="10" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                        </div>
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-1">Fecha de Nacimiento</label>
                            <input type="text" id="fechaNacimiento" placeholder="dd/mm/aaaa" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                        </div>
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-1">Género</label>
                            <select id="genero" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                                <option value="">Seleccionar</option>
                                <option value="Masculino">Masculino</option>
                                <option value="Femenino">Femenino</option>
                                <option value="Otro">Otro</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="pb-2">
                    <h3 class="text-lg font-semibold text-white mb-3">Datos Académicos</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-1">Institución Educativa</label>
                            <input type="text" id="institucion" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                        </div>
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-1">Número de Control (8 o 9 dígitos)</label>
                            <input type="text" id="numeroControl" pattern="\d{8,9}" maxlength="9" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                        </div>
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-1">Carrera</label>
                            <select id="carrera" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                                <option value="">Seleccionar carrera...</option>
                                <option value="Ingeniería en Sistemas Computacionales">Ingeniería en Sistemas Computacionales</option>
                                <option value="Ingeniería Civil">Ingeniería Civil</option>
                                <option value="Ingeniería Mecatrónica">Ingeniería Mecatrónica</option>
                                <option value="Ingeniería Ambiental">Ingeniería Ambiental</option>
                                <option value="Contabilidad">Contabilidad</option>
                                <option value="Administración">Administración</option>
                                <option value="Ingeniería Industrial">Ingeniería Industrial</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-1">Semestre</label>
                            <select id="semestre" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                                <option value="">Seleccionar semestre</option>
                                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                                <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                                <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                                <option value="Egresado">Egresado</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-1">Año de Ingreso</label>
                            <input type="number" id="anioIngreso" min="2000" max="2030" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                        </div>
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-1">Rol en el equipo</label>
                            <select id="rol" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                                <option value="">Seleccionar rango...</option>
                                <option value="Administrador">ADMINISTRADOR</option>
                                <option value="Desarrollador">DESARROLLADOR</option>
                                <option value="Diseñador">DISEÑADOR</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="w-full bg-white text-black font-bold py-2 rounded-md border border-white hover:bg-transparent hover:text-white transition-all duration-300 tracking-wide">Registrar en Polaris</button>
            </form>
        </div>

        <div class="mb-16">
            <h2 class="text-2xl font-bold text-center mb-6">Personal Registrado</h2>
            <div id="listaMiembros" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <hr class="border-white/20 my-8">

        <div class="bg-black/70 backdrop-blur-md border border-white/10 rounded-xl p-8 mb-12 max-w-2xl mx-auto shadow-2xl">
            <h2 class="text-2xl font-bold text-white border-l-4 border-white pl-4 mb-6">Registro de Evento / Proyecto</h2>
            <form id="formEvento" class="space-y-5">
                <input type="hidden" id="eventoId">
                <div>
                    <label class="block text-gray-300 text-sm font-medium mb-1">Nombre del evento</label>
                    <input type="text" id="eventoNombre" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                </div>
                <div>
                    <label class="block text-gray-300 text-sm font-medium mb-1">Tipo</label>
                    <select id="eventoTipo" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                        <option value="">Seleccionar...</option>
                        <option value="Proyecto">Proyecto</option>
                        <option value="Evento">Evento</option>
                        <option value="Competencia">Competencia</option>
                        <option value="Actividad">Actividad</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-300 text-sm font-medium mb-1">Descripción breve</label>
                    <textarea id="eventoDescripcion" rows="2" class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2"></textarea>
                </div>
                <div>
                    <label class="block text-gray-300 text-sm font-medium mb-1">Fecha de inicio</label>
                    <input type="date" id="eventoFechaInicio" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                </div>
                <div>
                    <label class="block text-gray-300 text-sm font-medium mb-1">Fecha de cierre</label>
                    <input type="date" id="eventoFechaFin" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                </div>
                <div>
                    <label class="block text-gray-300 text-sm font-medium mb-1">Estado</label>
                    <select id="eventoEstado" required class="w-full bg-black border border-gray-700 text-white rounded-md px-4 py-2">
                        <option value="abierto">Abierto (activo)</option>
                        <option value="cerrado">Cerrado (inactivo)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-300 text-sm font-medium mb-1">Participantes iniciales</label>
                    <div id="participantesCheckboxes" class="bg-black/40 p-3 rounded-md max-h-40 overflow-y-auto space-y-2">
                        <p class="text-gray-400 text-sm">Cargando miembros...</p>
                    </div>
                </div>
                <button type="submit" id="btnRegistrarEvento" class="w-full bg-white text-black font-bold py-2 rounded-md border border-white hover:bg-transparent hover:text-white transition-all">Registrar Evento</button>
                <button type="button" id="btnCancelarEdicionEvento" class="w-full bg-transparent border border-white text-white py-2 rounded-md hover:bg-white hover:text-black transition-all hidden">Cancelar Edición</button>
            </form>
        </div>

        <div>
            <h2 class="text-2xl font-bold text-center mb-6">Eventos / Proyectos Registrados</h2>
            <div id="listaEventos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <script src="./src/app.js"></script>
</body>
</html>
