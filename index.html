<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLARIS - CRUD de Miembros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center mb-4 text-primary">Sistema POLARIS</h2>

        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title mb-4">Nuevo Miembro</h4>
                        <form id="formRegistro">
                            <div class="mb-3">
                                <label class="form-label">Nombre completo</label>
                                <input type="text" id="nombre" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Correo electrónico</label>
                                <input type="email" id="correo" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Rol en el equipo</label>
                                <select id="rol" class="form-select" required>
                                    <option value="">Selecciona un rol...</option>
                                    <option value="Administrador">Administrador</option>
                                    <option value="Desarrollador">Desarrollador</option>
                                    <option value="Diseñador">Diseñador</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Registrar en POLARIS</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <h4 class="mb-3">Miembros Registrados</h4>
                <div id="listaMiembros" class="row g-3">
                    </div>
            </div>
        </div>
    </div>

    <script src="./src/app.js"></script>
</body>
</html>
